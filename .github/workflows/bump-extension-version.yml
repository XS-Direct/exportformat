name: Bump extension version

on:
  push:
    branches: [main]
    paths:
      - 'pace-editor-extension/src/**'
      - 'pace-editor-extension/package.json'
      - 'pace-editor-extension/vite.config.ts'
      - 'pace-editor-extension/manifest.config.ts'

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        working-directory: pace-editor-extension
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          # Split version into parts
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          NEW_PATCH=$((PATCH + 1))
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH"
          # Update package.json
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          echo "Bumped $CURRENT → $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pace-editor-extension/package.json
          git diff --cached --quiet && echo "No change" && exit 0
          git commit -m "chore: bump extension to v${{ env.NEW_VERSION }}"
          git push
